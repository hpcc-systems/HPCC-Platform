# PR Title Validation
# ====================
# Ensures pull request titles follow the Conventional Commits format
#
name: pr-title-check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - "master"
      - "candidate-*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  VALID_TYPES: "build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test|deps|release|hotfix|security"

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"

          # Check if title follows Conventional Commits format
          if echo "$PR_TITLE" | grep -qE "^(${VALID_TYPES})(\([a-zA-Z0-9_.-]+\))?!?: .+"; then
            echo "✓ PR title is valid: follows Conventional Commits format"
          else
            echo "✗ PR title is invalid"
            echo ""
            echo "PR titles must follow the Conventional Commits specification."
            echo "Format: <type>(<optional scope>)<!>: <description>"
            echo "Valid types: ${VALID_TYPES//|/, }"
            echo "Examples:"
            echo "  ✓ fix(dfu): resolve memory leak in thor"
            echo "  ✓ feat: add a new logging feature"
            echo "  ✓ refactor!: breaking change API redesign"
            echo "  ✗ HPCC-12345 Update documentation"
            echo "  ✗ Fix memory leak"
            exit 1
          fi

      - name: Check first commit message format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Getting first commit in PR..."

          # Get the first commit in the PR
          FIRST_COMMIT=$(git rev-list --reverse ${BASE_SHA}..${HEAD_SHA} | head -n 1)

          if [ -z "$FIRST_COMMIT" ]; then
            echo "✗ Could not determine first commit"
            exit 1
          fi

          # Get the commit message (first line)
          COMMIT_MSG=$(git log --format=%s -n 1 "$FIRST_COMMIT")
          echo "First commit message: $COMMIT_MSG"

          # Check if commit message follows Conventional Commits format
          if echo "$COMMIT_MSG" | grep -qE "^(${VALID_TYPES})(\([a-zA-Z0-9_.-]+\))?!?: .+"; then
            echo "✓ First commit message is valid: follows Conventional Commits format"
          else
            echo "✗ First commit message is invalid"
            echo ""
            echo "The first commit message must follow the Conventional Commits specification."
            echo "Format: <type>(<optional scope>)<!>: <description>"
            echo "Valid types: ${VALID_TYPES//|/, }"
            echo "Examples:"
            echo "  ✓ fix(dfu): resolve memory leak in thor"
            echo "  ✓ docs: update documentation"
            echo "  ✓ refactor!: breaking change API redesign"
            echo "  ✗ Fix memory leak"
            exit 1
          fi

          exit 0
