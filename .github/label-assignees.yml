# Label to Assignee Mapping
#
# Maps GitHub usernames to the issue labels that trigger auto-assignment.
# An issue is auto-assigned only when it currently has no assignee.
# If multiple labels on an issue match different users, all matching users
# are assigned.  If multiple users list the same label, all of them are
# assigned (same behaviour as matching via different labels).  If more than
# 3 users would be assigned, the issue is left unassigned and a warning is
# logged.
#
# Format:
#   assignees:
#     <github-username>:
#       - <label-name>   # optional inline comment

